name: Build Ionic App for iOS

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - run: npm install
    
    - run: npm install -g @ionic/cli
    
    - run: ionic build
    
    - run: |
        sudo gem install cocoapods
        npm install @capacitor/core @capacitor/cli
        npx cap add ios
        npx cap sync ios
    
    - run: |
        cd ios/App
        pod install
        cd ../..
    
    - run: |
        cd ios/App
        xcodebuild build -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator
        cd ../..
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: ios